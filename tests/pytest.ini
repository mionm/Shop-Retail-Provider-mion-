[pytest]
testpaths = unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
asyncio_mode = auto
markers =
    integration: marks tests requiring live services (deselect with -m "not integration")
filterwarnings =
    ignore::PendingDeprecationWarning
    ignore::DeprecationWarning:pydantic
    ignore::pydantic.PydanticDeprecatedSince20
    ignore::sqlalchemy.exc.MovedIn20Warning
