name: Python unit tests

on:
  pull_request:
    paths:
      - ".github/workflows/python-unit-tests.yml"
      - "catalog_retriever/**/*.py"
      - "catalog_retriever/requirements.txt"
      - "chain_server/**/*.py"
      - "chain_server/requirements.txt"
      - "guardrails/**/*.py"
      - "guardrails/src/requirements.txt"
      - "memory_retriever/**/*.py"
      - "memory_retriever/requirements.txt"
      - "tests/**/*.py"
      - "tests/pytest.ini"
      - "tests/requirements-dev.txt"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      LLM_API_KEY: test-llm-api-key
      EMBED_API_KEY: test-embed-api-key
      RAIL_API_KEY: test-rail-api-key
      NVIDIA_API_KEY: test-nvidia-api-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-dev.txt

      - name: Install unit test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests/requirements-dev.txt

      - name: Run offline unit tests
        working-directory: tests
        run: python -m pytest -q unit
